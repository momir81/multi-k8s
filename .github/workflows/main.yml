name: Multi Container Setup
on:
  push:
    branches:
      - main
 
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
      
      - run: docker build -t momir81/multi-client-test -f ./client/Dockerfile.dev ./client
      - run: docker run -e CI=true momir81/multi-client-test npm test
      
  
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
      - run: docker build -t momir81/multi-client ./client
      - run: docker push momir81/multi-client

      - run: docker build -t momir81/multi-nginx ./nginx
      - run: docker push momir81/multi-nginx

      - run: docker build -t momir81/multi-server ./server
      - run: docker push momir81/multi-server

      - run: docker build -t momir81/multi-worker ./worker
      - run: docker push momir81/multi-worker
      

      
      - name: Generate deployment package
        run: zip -r deploy.zip . -x '*.git*'
      
      - name: Deploy to EB
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY }}
          aws_secret_key: ${{ secrets.AWS_SECRET_KEY }}
          application_name: ${{ secrets.APPLICATION }}
          environment_name: ${{ secrets.ENV }}
          existing_bucket_name: ${{ secrets.BUCKET }}
          region: ${{ secrets.REGION }}
          version_label: ${{ github.sha }}
          deployment_package: deploy.zip
          use_existing_version_if_available: true